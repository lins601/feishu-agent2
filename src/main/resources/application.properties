spring.application.name=manufacturing-assistant
server.port=8080

# ===== WISE 知识库配置 =====
wise.api-url=${WISE_API_URL:https://wise.cvte.com/api/v1}
wise.api-key=${WISE_API_KEY:}
wise.agent-id=${WISE_AGENT_ID:builtin-smart-reasoning}
wise.knowledge-base-id=${WISE_KNOWLEDGE_BASE_ID:}
wise.faq.knowledge-base-id=${WISE_FAQ_KNOWLEDGE_BASE_ID:}
wise.faq.entry-path=${WISE_FAQ_ENTRY_PATH:}
wise.faq.default-tag-id=${WISE_FAQ_DEFAULT_TAG_ID:}
wise.search-timeout=${WISE_SEARCH_TIMEOUT:60}
wise.search-max-retries=${WISE_SEARCH_MAX_RETRIES:3}

# ===== 大模型配置（先 mock，后接真实 LLM）=====
llm.provider=mock
llm.api-key=${LLM_API_KEY:}
llm.base-url=${LLM_BASE_URL:https://api.deepseek.com}
llm.model=deepseek-chat

# ===== 飞书机器人配置 =====
feishu.app-id=${FEISHU_APP_ID:cli_aaabe5dd43f9dcd5}
feishu.app-secret=${FEISHU_APP_SECRET:siC6HuGmul27sanrTgRdWbniAL41PQsA}
feishu.verification-token=${FEISHU_VERIFICATION_TOKEN:j9fORlOEGdSk4Jpg8OiGxdWkjbF5MyS6}
feishu.encrypt-key=${FEISHU_ENCRYPT_KEY:}
# WISE-only 模式下只订阅反馈卡片回调，不接管 WISE 的消息回复。
feishu.websocket.enabled=true

# ===== 管理员通知 =====
feishu.admin.notify.enabled=${FEISHU_ADMIN_NOTIFY_ENABLED:true}
feishu.admin.chat-id=${FEISHU_ADMIN_CHAT_ID:}

# ===== 回答完成后异步发送反馈卡片 =====
# 直连 WISE Agent 模式下不再旁路轮询外置 WISE 卡片，避免写入不可读的占位摘要。
feishu.feedback.enabled=false
# 后端直连 WISE Agent，获取 SSE 完整正文后再回复飞书和写入多维表格。
feishu.feedback.wise-only=false
feishu.feedback.listen-message-events=${FEISHU_FEEDBACK_LISTEN_MESSAGE_EVENTS:false}
feishu.feedback.card-actions-enabled=${FEISHU_FEEDBACK_CARD_ACTIONS_ENABLED:true}
feishu.feedback.card-action-mode=${FEISHU_FEEDBACK_CARD_ACTION_MODE:callback}
feishu.feedback.action-url-base=${FEISHU_FEEDBACK_ACTION_URL_BASE:}
feishu.feedback.require-mention-in-group=${FEISHU_FEEDBACK_REQUIRE_MENTION_IN_GROUP:true}
feishu.feedback.chat-id=${FEISHU_FEEDBACK_CHAT_IDS:}
feishu.feedback.auto-register.enabled=${FEISHU_FEEDBACK_AUTO_REGISTER_ENABLED:true}
feishu.feedback.auto-register.load-existing-chats=${FEISHU_FEEDBACK_LOAD_EXISTING_CHATS:true}
feishu.feedback.auto-register.persist-path=${FEISHU_FEEDBACK_AUTO_REGISTER_PATH:data/feishu-feedback-chats.txt}
feishu.feedback.permission-fallback.enabled=${FEISHU_FEEDBACK_PERMISSION_FALLBACK_ENABLED:true}
feishu.feedback.permission-fallback.delay-ms=${FEISHU_FEEDBACK_PERMISSION_FALLBACK_DELAY_MS:12000}
feishu.feedback.message-poll-interval-ms=5000
feishu.feedback.reply-poll-interval-ms=2000
# WISE 流式回复停止更新后的稳定等待时间，避免在回答过程中插入反馈卡片。
feishu.feedback.reply-stable-ms=${FEISHU_FEEDBACK_REPLY_STABLE_MS:5000}
feishu.feedback.reply-timeout-ms=${FEISHU_FEEDBACK_REPLY_TIMEOUT_MS:300000}
feishu.feedback.send-on-timeout=${FEISHU_FEEDBACK_SEND_ON_TIMEOUT:false}
feishu.feedback.miss-notice.enabled=true
feishu.feedback.timeout-notice.enabled=${FEISHU_FEEDBACK_TIMEOUT_NOTICE_ENABLED:true}
# WISE 富文本卡片正文不可读并不代表知识库未命中，不能据此写入未命中表。
feishu.feedback.record-opaque-wise-as-miss=${FEISHU_FEEDBACK_RECORD_OPAQUE_WISE_AS_MISS:false}
# WISE 富文本回答无法直接读取时，OCR 提取正文并写入问答记录，便于表格检索。
feishu.feedback.wise-ocr-enabled=${FEISHU_FEEDBACK_WISE_OCR_ENABLED:true}
feishu.feedback.max-question-length=500
feishu.feedback.context-ttl-ms=300000

# ===== 飞书多维表格 =====
feishu.bitable.app-token=${FEISHU_BITABLE_APP_TOKEN:DcEBwdoisi8z5RkGONYcUEgtnQf}
feishu.bitable.operation-app-token=${FEISHU_OPERATION_APP_TOKEN:XZoBbQqOIarIFRsW61hcw2kfnuc}
feishu.bitable.miss-app-token=${FEISHU_MISS_APP_TOKEN:SNbEwLuCMifhyskan7cccrT2nzf}
feishu.bitable.qa-table-id=${FEISHU_QA_TABLE_ID:tbljKQs6RhB3dd71}
feishu.bitable.feedback-table-id=${FEISHU_FEEDBACK_TABLE_ID:tblAXHiE00MxTWvI}
feishu.bitable.miss-table-id=${FEISHU_MISS_TABLE_ID:tblfTUzTnEJRDPzo}
feishu.bitable.miss-view-id=${FEISHU_MISS_VIEW_ID:vewHyy9mVW}
feishu.bitable.review-table-id=${FEISHU_REVIEW_TABLE_ID:tblXKrnuBMRrO9r2}
feishu.bitable.sync-table-id=${FEISHU_SYNC_TABLE_ID:tblFGWKjHJl8a32v}
feishu.bitable.faq-draft-table-id=${FEISHU_FAQ_DRAFT_TABLE_ID:tblOKywgj0hskomW}
feishu.bitable.mindoc-mapping-table-id=${FEISHU_MINDOC_MAPPING_TABLE_ID:tbl6HbxBSHDJH65m}
feishu.bitable.mindoc-mapping-view-id=${FEISHU_MINDOC_MAPPING_VIEW_ID:vewc8Mdnty}

# ===== MinDoc 定时同步到 WISE =====
mindoc.sync.enabled=true
mindoc.sync.cron=0 0 2 ? * THU
mindoc.sync.zone=Asia/Shanghai
mindoc.sync.python=python3
mindoc.sync.script-path=scripts/crawl_mindoc_wise_v4_incremental_delete.py
mindoc.sync.output-dir=knowledge-base
mindoc.sync.default-kb-id=${WISE_KNOWLEDGE_BASE_ID:}
mindoc.sync.max-pages=0
mindoc.sync.concurrency=10
mindoc.sync.upload-concurrency=5
mindoc.sync.delay=0.05
mindoc.sync.timeout-seconds=30
mindoc.sync.delete-old-on-update=true
mindoc.sync.inject-images=true
mindoc.sync.poll=true

# ===== FAQ 草稿闭环 =====
faq.draft.enabled=true
faq.draft.ingest-enabled=true
faq.draft.miss-threshold=3
faq.draft.reconcile-initial-delay-ms=15000
faq.draft.reconcile-interval-ms=300000

# ===== 运营报表 =====
operation.report.enabled=${OPERATION_REPORT_ENABLED:true}
operation.report.zone=Asia/Shanghai
operation.report.archive-enabled=${OPERATION_REPORT_ARCHIVE_ENABLED:true}
operation.report.archive-dir=${OPERATION_REPORT_ARCHIVE_DIR:data/reports}
operation.report.weekly-cron=0 0 9 ? * MON
operation.report.monthly-cron=0 0 9 1 * ?
operation.miss.top-notify-threshold=${OPERATION_MISS_TOP_NOTIFY_THRESHOLD:3}

# ===== Logging =====
logging.level.com.example.myapp=DEBUG
logging.file.name=logs/application.log
logging.level.com.example.myapp.service.WiseAgentService=DEBUG
logging.level.com.lark.oapi=INFO
logging.level.com.lark.oapi.ws=INFO
